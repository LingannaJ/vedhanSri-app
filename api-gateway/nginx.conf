worker_processes 1;

events { 
    worker_connections 1024; 
}

http {
    sendfile on;

    # --- Backend Upstreams ---
    upstream catalog_upstream {
        server catalog-service:8000;
    }

    upstream academy_upstream {
        server academy-service:8081;
    }

    upstream booking_upstream {
        server booking-service:8082;
    }

    # --- Frontend Upstream ---
    upstream frontend_upstream {
        server frontend:3000;
    }

    server {
        listen 80;

        # 1. Frontend Route (Root path)
        # ఎవరైనా కేవలం localhost/ అని కొడితే ఇక్కడికి వెళ్తారు
        location / {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Catalog Service Route
        location /api/catalog/ {
            proxy_pass http://catalog_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. Academy Service Route
        location /api/academy/ {
            proxy_pass http://academy_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Booking Service Route
        location /api/booking/ {
            proxy_pass http://booking_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 5. Gateway Health Check
        location /health {
            access_log off;
            return 200 'Vedhan Sri Gateway is Online';
        }
    }
}