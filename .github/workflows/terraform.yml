name: Vedhan Sri Infra Management (Manual)

on:
  # ఇది మాన్యువల్‌గా బటన్ ద్వారా రన్ చేయడానికి అనుమతిస్తుంది
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform Action (apply/destroy)'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy

jobs:
  terraform:
    name: 'Terraform ${{ github.event.inputs.terraform_action }}'
    runs-on: ubuntu-latest
    
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: 'us-east-1'

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          clean: true       # పాత ఫైల్స్ ఏవీ మిగలకుండా క్లీన్ చేస్తుంది
          fetch-depth: 0    # పూర్తి హిస్టరీని తీసుకుంటుంది

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Clean Terraform Cache
        run: |
          rm -rf .terraform/
          rm -f .terraform.lock.hcl

      - name: Terraform Init
        run: |
          terraform init -upgrade \
            -backend-config="region=us-east-1" \
            -backend-config="bucket=vedhansri-terraform-state" \
            -backend-config="key=infra/terraform.tfstate"

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Execution
        # యూజర్ సెలెక్ట్ చేసిన ఆప్షన్ (apply లేదా destroy) ని ఇక్కడ రన్ చేస్తుంది
        run: |
          if [ "${{ github.event.inputs.terraform_action }}" == "apply" ]; then
            echo "Running Terraform Apply..."
            terraform apply -auto-approve -input=false
          elif [ "${{ github.event.inputs.terraform_action }}" == "destroy" ]; then
            echo "Running Terraform Destroy..."
            terraform destroy -auto-approve -input=false
          fi