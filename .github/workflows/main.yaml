name: Vedhan Sri App CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'EKS కి డెప్లాయ్ చేయాలా? (yes/no)'
        required: true
        default: 'no'

jobs:
  build-and-push:
    name: Build & Push Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Academy Service (Java/Maven)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build Academy
        run: |
          mvn -f academy-service/pom.xml clean package -DskipTests
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/academy-service:latest ./academy-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academy-service:latest

      # 2. Catalog Service (Python)
      - name: Build & Push Catalog
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:latest ./catalog-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/catalog-service:latest

      # 3. Booking Service (Python)
      - name: Build & Push Booking
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/booking-service:latest ./booking-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/booking-service:latest

      # 4. Frontend (React)
      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  deploy-to-eks:
    name: Deploy to EKS
    needs: build-and-push
    if: github.event.inputs.confirm_deploy == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ఇక్కడ పాత స్టెప్ ని తీసేసి, ఈ కొత్త స్టెప్ ని పేస్ట్ చేయండి
      - name: Inject Secrets and Deploy
        env:
          DB_USERNAME_BASE64: ${{ secrets.DB_USERNAME_BASE64 }}
          DB_PASSWORD_BASE64: ${{ secrets.DB_PASSWORD_BASE64 }}
        run: |
          # 1. Cluster కి కనెక్ట్ అవ్వడం
          aws eks update-kubeconfig --name vedhansri-eks-cluster --region us-east-1
          
          # 2. envsubst వాడి సీక్రెట్స్ ని ఫైల్ లోకి పంపడం (ఇది GitHub రన్నర్ లోనే జరుగుతుంది)
          envsubst < k8s/base/db-secrets.yaml > k8s/base/db-secrets-final.yaml
          
          # 3. వరుసగా అప్లై చేయడం
          kubectl apply -f k8s/base/namespace.yaml
          kubectl apply -f k8s/base/db-secrets-final.yaml
          
          # 4. మిగిలిన అన్ని సర్వీసులు, ఇన్గ్రెస్ అప్లై చేయడం
          kubectl apply -f k8s/