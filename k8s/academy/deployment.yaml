apiVersion: apps/v1
kind: Deployment
metadata:
  name: academy-service
  namespace: vedhansri-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: academy
  template:
    metadata:
      labels:
        app: academy
    spec:
      containers:
      - name: academy-app
        image: lingannaj/academy-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_HOST
          value: "vedhansri-production-db.xyz.us-east-1.rds.amazonaws.com"
        - name: DB_NAME
          value: "academy_db"