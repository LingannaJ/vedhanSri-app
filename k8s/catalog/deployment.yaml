apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: vedhansri-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: catalog-app
        image: your-docker-username/catalog-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: DB_HOST
          value: "vedhansri-production-db.xyz.ap-south-1.rds.amazonaws.com" # Terraform RDS endpoint
        - name: DATABASE_URL
          value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):5432/catalog_db"