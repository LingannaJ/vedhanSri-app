apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vedhansri-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-app
        image: lingannaj/frontend:latest # CI/CD ద్వారా వచ్చే ఇమేజ్
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"